server.port=8080
spring.application.name=backend

# Base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/ventas_ac?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT
jwt.secret=clave-secreta-muy-larga-para-produccion-123456789
jwt.expiration=28800000

# CORS
frontend.url=http://localhost:8081

# Subida de imagenes
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
upload.dir=uploads/

# Logs
logging.file.name=logs/app.log
logging.level.root=INFO
logging.level.com.ventas=DEBUG